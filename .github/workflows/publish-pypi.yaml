# Publishes the package to PyPI whenever a GitHub Release is published.
# Requires a PYPI_API_TOKEN secret (Settings > Secrets and variables >
# Actions) containing a PyPI API token scoped to the pypetb project.
permissions:
  contents: read

on:
  release:
    types: [published]

env:
  POETRY_VERSION: 2.1.3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - run: poetry install --no-interaction

      - name: Check release tag matches package version
        run: |
          PACKAGE_VERSION=$(poetry version -s)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag ($GITHUB_REF_NAME) does not match pyproject.toml version ($PACKAGE_VERSION)"
            exit 1
          fi

      - run: poetry run flake8 src/ tests/
      - run: poetry run pytest

      - run: poetry build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pypetb/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: poetry publish --no-interaction
